<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a9fe8"/>
      <stop offset="100%" stop-color="#1979c9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- White speech bubble (shifted up-left for visual centering) -->
  <path d="M120 268c0-85 72-155 155-155s155 70 155 155c0 40-15 75-42 103l16 56-62-18a148 148 0 0 1-67 14c-85 0-155-70-155-155Z"
        fill="#fff" stroke="#fff" stroke-width="12"/>

  <!-- Left eye: < (angle bracket) -->
  <path d="M240 240l-22 22l22 22"
        fill="none" stroke="#1979c9" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right eye: > (angle bracket) -->
  <path d="M328 240l22 22l-22 22"
        fill="none" stroke="#1979c9" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Smile arc -->
  <path d="M220 340c38 26 88 26 126 0"
        fill="none" stroke="#1979c9" stroke-width="18" stroke-linecap="round"/>

  <!-- Pink tongue (at right side of smile, playful) -->
  <ellipse cx="340" cy="352" rx="16" ry="11"
           fill="#f472b6" stroke="#ec4899" stroke-width="2.5"
           transform="rotate(15 340 352)"/>
</svg>
